<script>
  const bgList = [
    './images/backgrounds/EFF.GIF',
    './images/backgrounds/PIC.GIF',
    './images/backgrounds/TVH.GIF',
    './images/backgrounds/SKY.GIF',
    './images/backgrounds/HEART.GIF',
    './images/backgrounds/IMG_3366.PNG',
    './images/backgrounds/GL.PNG',
    './images/backgrounds/LT.PNG',
  ];
  const picked = bgList[Math.floor(Math.random() * bgList.length)];
  
  // Áp vào fog-clouds-bg thay vì body
  const fogEl = document.querySelector('.fog-clouds-bg');
  if (fogEl) {
    fogEl.style.background = `url('${picked}') no-repeat center center`;
    fogEl.style.backgroundSize = 'contain';
    fogEl.style.opacity = '1';
  }
  
  // Đồng thời áp vào body
  document.body.style.backgroundImage = `url('${picked}')`;
  document.body.style.backgroundSize = 'cover';        // giữ kích thước gốc của GIF
  document.body.style.backgroundPosition = 'center';
  
  console.log('Background:', picked);
</script>

<script>
function toggleFullscreen() {
    var iframe = document.getElementById("pdf-view");
    
    if (!document.fullscreenElement) {
        // Nếu chưa toàn màn hình, tiến hành phóng to khung iframe
        if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) { /* Safari */
            iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) { /* IE11 */
            iframe.msRequestFullscreen();
        }
    } else {
        // Nếu đang toàn màn hình thì thoát ra
        if (document.exitFullscreen) {
            document.exitFullscreen();
        }
    }
}
</script>
